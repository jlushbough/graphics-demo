<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#000000">
<title>Liquid Aurora</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: #000; overflow: hidden; touch-action: none; -webkit-tap-highlight-color: transparent; user-select: none; }
  canvas { display: block; width: 100vw; height: 100vh; }
  #hud { position: fixed; top: 0; left: 0; right: 0; display: flex; justify-content: space-between; align-items: flex-start; padding: 18px 20px; pointer-events: none; }
  #title { font-family: 'Courier New', monospace; font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: rgba(255,255,255,0.45); }
  #title b { display: block; font-size: 17px; letter-spacing: 0.08em; color: rgba(255,255,255,0.8); font-weight: 700; margin-bottom: 2px; }
  #fps-box { font-family: 'Courier New', monospace; font-size: 11px; color: rgba(255,255,255,0.3); text-align: right; letter-spacing: 0.05em; }
  #hint { position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%); font-family: 'Courier New', monospace; font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(255,255,255,0.22); pointer-events: none; white-space: nowrap; transition: opacity 1s; }
  #hint.fade { opacity: 0; }
  #pal-btn { position: fixed; bottom: 20px; right: 20px; width: 52px; height: 52px; border-radius: 50%; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.18); color: rgba(255,255,255,0.5); font-family: 'Courier New', monospace; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); transition: background 0.2s; touch-action: manipulation; }
  #pal-btn:active { background: rgba(255,255,255,0.18); }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">
  <div id="title"><b>Liquid Aurora</b>WebGL Domain Warp</div>
  <div id="fps-box">-- fps</div>
</div>
<div id="hint">Touch to warp &middot; Tap to pulse &middot; &#9680; to shift palette</div>
<button id="pal-btn" aria-label="Cycle palette">&#9680;</button>
<script>
'use strict';
const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl', {antialias:false,alpha:false}) || canvas.getContext('experimental-webgl', {antialias:false});
if (!gl) { document.body.innerHTML = '<p style="color:#fff;padding:40px;font-family:monospace">WebGL not supported.</p>'; throw new Error('no webgl'); }

const VS = `attribute vec2 a_pos; void main(){ gl_Position = vec4(a_pos,0.0,1.0); }`;

const FS = `
precision highp float;
uniform vec2  u_res;
uniform float u_time;
uniform int   u_nTouch;
uniform vec2  u_tPos[8];
uniform float u_tStr[8];
uniform float u_pulse;
uniform vec2  u_pulsePos;
uniform float u_pulseAge;
uniform int   u_palette;
#define PI 3.14159265358979
#define TAU 6.28318530718

vec2 hash2(vec2 p){
  p = vec2(dot(p,vec2(127.1,311.7)), dot(p,vec2(269.5,183.3)));
  return -1.0 + 2.0*fract(sin(p)*43758.5453);
}
float noise(vec2 p){
  vec2 i=floor(p), f=fract(p);
  vec2 u=f*f*(3.0-2.0*f);
  return mix(
    mix(dot(hash2(i+vec2(0,0)),f-vec2(0,0)), dot(hash2(i+vec2(1,0)),f-vec2(1,0)),u.x),
    mix(dot(hash2(i+vec2(0,1)),f-vec2(0,1)), dot(hash2(i+vec2(1,1)),f-vec2(1,1)),u.x),
    u.y);
}
float fbm4(vec2 p){
  mat2 m = mat2(1.6,1.2,-1.2,1.6);
  float v=0.0, a=0.5;
  v+=a*noise(p); p=m*p; a*=0.5;
  v+=a*noise(p); p=m*p; a*=0.5;
  v+=a*noise(p); p=m*p; a*=0.5;
  v+=a*noise(p);
  return v;
}
float fbm6(vec2 p){
  mat2 m = mat2(1.6,1.2,-1.2,1.6);
  float v=0.0, a=0.5;
  v+=a*noise(p); p=m*p; a*=0.5;
  v+=a*noise(p); p=m*p; a*=0.5;
  v+=a*noise(p); p=m*p; a*=0.5;
  v+=a*noise(p); p=m*p; a*=0.5;
  v+=a*noise(p); p=m*p; a*=0.5;
  v+=a*noise(p);
  return v;
}
vec3 hsv(float h, float s, float v){
  vec4 K=vec4(1.0,2.0/3.0,1.0/3.0,3.0);
  vec3 p=abs(fract(vec3(h)+K.xyz)*6.0-K.www);
  return v*mix(K.xxx,clamp(p-K.xxx,0.0,1.0),s);
}
vec3 palette(float f, float t){
  float n = f*0.5+0.5;
  if(u_palette==0){
    float h = 0.52 + n*0.22 + sin(t*0.08+n*PI)*0.05;
    float s = 0.75 + n*0.25;
    float v = 0.15 + 0.85*smoothstep(0.0,1.0,pow(n,0.7));
    v += pow(max(0.0,n-0.6),2.0)*0.6;
    return hsv(fract(h), clamp(s,0.0,1.0), clamp(v,0.0,1.2));
  } else if(u_palette==1){
    float h = 0.0 + n*0.12 - t*0.01;
    float s = 1.0 - n*0.45;
    float v = 0.1 + 0.9*pow(n,0.6);
    v += pow(max(0.0,n-0.7),2.0)*0.8;
    return hsv(fract(h), clamp(s,0.0,1.0), clamp(v,0.0,1.3));
  } else if(u_palette==2){
    float h = 0.70 + n*0.18 + sin(t*0.06)*0.04;
    float s = 0.85 - n*0.2;
    float v = 0.1 + 0.9*smoothstep(0.0,1.0,n);
    float gold = pow(max(0.0,fract(n*3.0+t*0.1)-0.7)/0.3, 2.0);
    h = mix(h, 0.12, gold*0.4);
    s = mix(s, 0.95, gold*0.5);
    v += gold*0.5;
    return hsv(fract(h), clamp(s,0.0,1.0), clamp(v,0.0,1.2));
  } else if(u_palette==3){
    float h = 0.48 + n*0.10 + cos(t*0.07+n*TAU)*0.03;
    float s = 0.9 - n*0.15;
    float v = 0.0 + 0.95*pow(n,1.2);
    float glow = pow(max(0.0,n-0.65),2.0)*1.2;
    v += glow; s = mix(s, 0.6, glow*0.3);
    return hsv(fract(h), clamp(s,0.0,1.0), clamp(v,0.0,1.3));
  } else if(u_palette==4){
    float h = 0.08 - n*0.06 + t*0.005;
    float s = 1.0 - pow(n,2.0)*0.8;
    float v = pow(n,0.5)*1.1;
    return hsv(fract(h), clamp(s,0.0,1.0), clamp(v,0.0,1.5));
  } else if(u_palette==5){
    float h = fract(n*0.6 + t*0.05);
    float s = 0.95;
    float v = pow(max(0.0, n + 0.2), 2.2) * 1.4;
    float spike = pow(max(0.0, 0.5 - abs(fract(n*3.0 + t*0.08) - 0.5)), 3.0) * 3.0;
    v += spike;
    s = mix(s, 1.0, min(1.0, spike));
    return hsv(fract(h), clamp(s,0.0,1.0), clamp(v,0.0,2.0));
  } else {
    float band = fract(n*6.0 + t*0.12);
    float filament = pow(1.0 - abs(band - 0.5)*2.0, 12.0) * 3.5;
    float h = fract(n*0.35 + t*0.04);
    float s = 1.0;
    float v = pow(n, 3.0)*0.3 + filament;
    return hsv(fract(h), clamp(s,0.0,1.0), clamp(v,0.0,2.5));
  }
}
void main(){
  vec2 uv = gl_FragCoord.xy / u_res;
  float ar = u_res.x / u_res.y;
  vec2 p = (uv*2.0-1.0) * vec2(ar,1.0);
  float t = u_time * 0.25;
  for(int i=0; i<8; i++){
    if(i >= u_nTouch) break;
    vec2 tp = (u_tPos[i]*2.0-1.0)*vec2(ar,1.0);
    vec2 d = p - tp;
    float r = length(d);
    float str = u_tStr[i];
    if(r < 2.0){
      float push = str * 0.5 * exp(-r*r*1.5);
      p += normalize(d+0.001) * push;
      float swirl = str * 1.8 * exp(-r*r*3.0);
      vec2 pd = p - tp;
      float cs=cos(swirl), sn=sin(swirl);
      p = tp + vec2(pd.x*cs - pd.y*sn, pd.x*sn + pd.y*cs);
    }
  }
  if(u_pulse > 0.0){
    vec2 pp = (u_pulsePos*2.0-1.0)*vec2(ar,1.0);
    float r = length(p - pp);
    float wf = u_pulseAge * 3.0;
    float ring = exp(-pow(r - wf, 2.0) * 14.0) * u_pulse;
    p += normalize(p - pp + 0.001) * ring * 0.4;
    float wf2 = max(0.0, u_pulseAge*3.0 - 0.4);
    float ring2 = exp(-pow(r - wf2, 2.0)*18.0) * u_pulse * 0.5;
    p -= normalize(p - pp + 0.001) * ring2 * 0.2;
  }
  vec2 q = vec2(fbm4(p + vec2(0.0,0.0) + t*0.4), fbm4(p + vec2(5.2,1.3) + t*0.37));
  vec2 r2 = vec2(fbm4(p + 4.8*q + vec2(1.7,9.2) + t*0.17), fbm4(p + 4.8*q + vec2(8.3,2.8) + t*0.14));
  float f = fbm6(p + 4.2*r2 + t*0.05);
  float shimmer = fbm4(p*3.0 + vec2(0.0,t*0.6)) * 0.12;
  f = f + shimmer;
  vec3 col = palette(f, u_time);
  float vig = 1.0 - 0.35*pow(length(uv - 0.5)*2.0, 2.2);
  col *= vig;
  gl_FragColor = vec4(clamp(col,0.0,1.0), 1.0);
}`;

function compileShader(type, src){
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if(!gl.getShaderParameter(s, gl.COMPILE_STATUS)) throw new Error(gl.getShaderInfoLog(s));
  return s;
}
const prog = gl.createProgram();
gl.attachShader(prog, compileShader(gl.VERTEX_SHADER, VS));
gl.attachShader(prog, compileShader(gl.FRAGMENT_SHADER, FS));
gl.linkProgram(prog);
if(!gl.getProgramParameter(prog, gl.LINK_STATUS)) throw new Error(gl.getProgramInfoLog(prog));
gl.useProgram(prog);

const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,1,-1,-1,1,1,1]), gl.STATIC_DRAW);
const posLoc = gl.getAttribLocation(prog, 'a_pos');
gl.enableVertexAttribArray(posLoc);
gl.vertexAttribPointer(posLoc, 2, gl.FLOAT, false, 0, 0);

const U = {};
['u_res','u_time','u_nTouch','u_pulse','u_pulsePos','u_pulseAge','u_palette'].forEach(n => U[n] = gl.getUniformLocation(prog, n));
const U_tPos = Array.from({length:8}, (_,i) => gl.getUniformLocation(prog, 'u_tPos['+i+']'));
const U_tStr = Array.from({length:8}, (_,i) => gl.getUniformLocation(prog, 'u_tStr['+i+']'));

let W, H;
function resize(){
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  W = Math.round(window.innerWidth * dpr);
  H = Math.round(window.innerHeight * dpr);
  canvas.width = W; canvas.height = H;
  gl.viewport(0, 0, W, H);
}
resize();
window.addEventListener('resize', resize);

let pal = 0;
const N_PAL = 7;
const touches = new Map();
let pulse = 0, pulsePos = [0.5,0.5], pulseAge = 0, pulsing = false, autoPulseTimer = 0;
let startTime = performance.now(), lastFrame = 0, frames = 0, fpsTimer = 0, interacted = false;
const fpsEl = document.getElementById('fps-box');
const hintEl = document.getElementById('hint');

function clientToUV(x, y){ return [x/window.innerWidth, 1 - y/window.innerHeight]; }
function firePulse(x, y){ pulsePos = clientToUV(x,y); pulseAge = 0; pulse = 1.0; pulsing = true; }
function hideHint(){ if(!interacted){ interacted = true; hintEl.classList.add('fade'); } }

let mouseDown = false;
window.addEventListener('mousedown', e => { hideHint(); mouseDown = true; const uv = clientToUV(e.clientX,e.clientY); touches.set('mouse',{x:uv[0],y:uv[1],str:1.0,lastT:performance.now()}); firePulse(e.clientX,e.clientY); });
window.addEventListener('mousemove', e => { if(!mouseDown) return; const uv=clientToUV(e.clientX,e.clientY); const en=touches.get('mouse'); if(en){en.x=uv[0];en.y=uv[1];en.str=1.0;en.lastT=performance.now();} });
window.addEventListener('mouseup', () => { mouseDown=false; touches.delete('mouse'); });
window.addEventListener('mouseleave', () => { mouseDown=false; touches.delete('mouse'); });

function onTouchStart(e){ e.preventDefault(); hideHint(); for(const t of e.changedTouches){ const uv=clientToUV(t.clientX,t.clientY); touches.set(t.identifier,{x:uv[0],y:uv[1],str:1.0,lastT:performance.now()}); } if(e.changedTouches.length>0){ const t=e.changedTouches[0]; firePulse(t.clientX,t.clientY); } }
function onTouchMove(e){ e.preventDefault(); for(const t of e.changedTouches){ const en=touches.get(t.identifier); if(en){ const uv=clientToUV(t.clientX,t.clientY); en.x=uv[0];en.y=uv[1];en.str=1.0;en.lastT=performance.now(); } } }
function onTouchEnd(e){ e.preventDefault(); for(const t of e.changedTouches) touches.delete(t.identifier); }
canvas.addEventListener('touchstart', onTouchStart, {passive:false});
canvas.addEventListener('touchmove', onTouchMove, {passive:false});
canvas.addEventListener('touchend', onTouchEnd, {passive:false});
canvas.addEventListener('touchcancel', onTouchEnd, {passive:false});

document.getElementById('pal-btn').addEventListener('click', e => { e.stopPropagation(); pal=(pal+1)%N_PAL; hideHint(); });
document.getElementById('pal-btn').addEventListener('touchend', e => { e.preventDefault(); e.stopPropagation(); pal=(pal+1)%N_PAL; hideHint(); }, {passive:false});
window.addEventListener('keydown', e => { if(e.code==='KeyP') pal=(pal+1)%N_PAL; if(e.code==='Space'){ e.preventDefault(); firePulse(window.innerWidth/2,window.innerHeight/2); } });

function animate(now){
  const dt = Math.min(now - lastFrame, 100); lastFrame = now;
  fpsTimer += dt; frames++;
  if(fpsTimer > 700){ fpsEl.textContent = Math.round(frames/(fpsTimer/1000))+' fps'; frames=0; fpsTimer=0; }
  const t = (now - startTime) / 1000;
  for(const [id, en] of touches){
    const age = (now - en.lastT) / 1000;
    en.str = Math.max(0, 1 - age*2.5);
    if(en.str <= 0 && id !== 'mouse' && !mouseDown) touches.delete(id);
  }
  if(pulsing){ pulseAge += dt/1000; pulse = Math.max(0, 1 - pulseAge/0.8); if(pulse<=0) pulsing=false; }
  autoPulseTimer += dt; if(autoPulseTimer > 4800 && !pulsing){ autoPulseTimer=0; firePulse(Math.random()*window.innerWidth, Math.random()*window.innerHeight); }
  gl.uniform2f(U.u_res, W, H);
  gl.uniform1f(U.u_time, t);
  gl.uniform1i(U.u_palette, pal);
  const tArr = [...touches.values()].slice(0,8);
  gl.uniform1i(U.u_nTouch, tArr.length);
  for(let i=0; i<8; i++){ const en=tArr[i]; gl.uniform2f(U_tPos[i], en?en.x:0, en?en.y:0); gl.uniform1f(U_tStr[i], en?en.str:0); }
  gl.uniform1f(U.u_pulse, pulsing?pulse:0);
  gl.uniform2f(U.u_pulsePos, pulsePos[0], pulsePos[1]);
  gl.uniform1f(U.u_pulseAge, pulseAge);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  requestAnimationFrame(animate);
}
requestAnimationFrame(animate);
</script>
</body>
</html>
