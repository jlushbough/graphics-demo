<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#F0EBE0">
<title>Vorkurs — Bauhaus 1926</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; background: #F0EBE0; overflow: hidden; touch-action: none; user-select: none; -webkit-tap-highlight-color: transparent; }
canvas { display: block; width: 100vw; height: 100vh; }
#lbl { position: fixed; bottom: 22px; left: 22px; font-family: 'Courier New', monospace; pointer-events: none; }
#lbl b { display: block; font-size: 15px; letter-spacing: 0.38em; color: #111; font-weight: 900; text-transform: uppercase; }
#lbl span { font-size: 9px; letter-spacing: 0.28em; color: #888; text-transform: uppercase; }
#hint { position: fixed; bottom: 22px; right: 22px; font-family: 'Courier New', monospace; font-size: 9px; letter-spacing: 0.22em; color: #aaa; text-transform: uppercase; pointer-events: none; transition: opacity 1.2s; }
#hint.fade { opacity: 0; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="lbl"><b>Vorkurs</b><span>Bauhaus · Dessau · 1926</span></div>
<div id="hint">Tap to compose</div>
<script>
'use strict';

const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const hintEl = document.getElementById('hint');

// Kandinsky's material–form–color theory:
//   Circle  → Blue  (cosmic, spiritual)
//   Square  → Red   (stable, material)
//   Triangle→ Yellow(energetic, aggressive)
const RED    = '#C8201A';
const YELLOW = '#F2C200';
const BLUE   = '#1538A0';
const BLACK  = '#0F0F0F';
const CREAM  = '#F0EBE0';

let W, H, cx, cy, U;
function resize() {
  W = canvas.width  = Math.round(window.innerWidth);
  H = canvas.height = Math.round(window.innerHeight);
  cx = W / 2; cy = H / 2;
  U  = Math.min(W, H) / 10;
}
resize();
window.addEventListener('resize', resize);

const T0 = performance.now();
let clicks = [], interacted = false;

// ── helpers ───────────────────────────────────────────────────────────────

function save(fn) { ctx.save(); fn(); ctx.restore(); }

function ring(x, y, r, color, w) {
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.strokeStyle = color; ctx.lineWidth = w; ctx.stroke();
}

function disc(x, y, r, color) {
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fillStyle = color; ctx.fill();
}

function wedge(x, y, r, a1, a2, fill) {
  ctx.beginPath();
  ctx.moveTo(x, y);
  ctx.arc(x, y, r, a1, a2);
  ctx.closePath();
  ctx.fillStyle = fill; ctx.fill();
}

function tri(x, y, r, angle, fill, stroke, sw) {
  ctx.beginPath();
  for (let i = 0; i < 3; i++) {
    const a = angle + i * Math.PI * 2 / 3 - Math.PI / 2;
    i ? ctx.lineTo(x + Math.cos(a) * r, y + Math.sin(a) * r)
      : ctx.moveTo(x + Math.cos(a) * r, y + Math.sin(a) * r);
  }
  ctx.closePath();
  if (fill)   { ctx.fillStyle   = fill;   ctx.fill(); }
  if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = sw; ctx.stroke(); }
}

function ln(x1, y1, x2, y2, color, w) {
  ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2);
  ctx.strokeStyle = color; ctx.lineWidth = w; ctx.stroke();
}

// ── scene elements ────────────────────────────────────────────────────────

// Klee-style receding grid — the groundwork
function drawGrid(t) {
  save(() => {
    ctx.globalAlpha = 0.07;
    ctx.strokeStyle = BLACK;
    ctx.lineWidth = 0.7;
    const sp = U * 1.6;
    const drift = (t * 4) % sp;
    for (let x = -sp + drift; x < W + sp; x += sp) {
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
    }
    for (let y = -sp + drift * 0.6; y < H + sp; y += sp) {
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
    }
  });
}

// Moholy-Nagy structural skeleton — dividing lines
function drawSkeleton(t) {
  save(() => {
    ctx.globalAlpha = 0.38;
    const thick = U * 0.038;
    ln(0,  cy - U * 2.4, W,  cy - U * 2.4, BLACK, thick);
    ln(0,  cy + U * 2.4, W,  cy + U * 2.4, BLACK, thick);
    ln(cx - U * 2.6, 0, cx - U * 2.6, H,   BLACK, thick);
    ln(cx + U * 2.6, 0, cx + U * 2.6, H,   BLACK, thick);
    // Breathing diagonal
    ctx.globalAlpha = 0.10;
    const d = U * 0.6 * Math.sin(t * 0.35);
    ln(0, d, W, H + d, BLACK, U * 0.018);
    ln(W, d, 0, H + d, BLACK, U * 0.018);
  });
}

// ── Form 1: The Blue Circle (spiritual, rotating inner mandala) ──
function drawBlueCircle(x, y, r, t) {
  save(() => {
    ctx.translate(x, y);
    // Body
    disc(0, 0, r, BLUE);
    // Inner rotating wedges (Moholy-Nagy's rotary discs)
    const n = 8;
    save(() => {
      ctx.globalCompositeOperation = 'source-atop';
      // clip to circle
    });
    for (let i = 0; i < n; i++) {
      const a1 = t * 0.45 + (i / n) * Math.PI * 2;
      const a2 = a1 + Math.PI / n;
      wedge(0, 0, r * 0.72, a1, a2, i % 2 === 0 ? CREAM : BLUE);
    }
    // Concentric rings in cream
    for (let i = 1; i <= 3; i++) {
      ring(0, 0, r * 0.24 * i, CREAM, U * 0.038);
    }
    // Inner dot
    disc(0, 0, r * 0.09, CREAM);
    // Border
    ring(0, 0, r, BLACK, U * 0.065);
    // Radial ticks (clock-like)
    save(() => {
      ctx.strokeStyle = CREAM;
      ctx.lineWidth = U * 0.025;
      for (let i = 0; i < 12; i++) {
        const a = (i / 12) * Math.PI * 2;
        const r1 = r * 0.76, r2 = r * 0.92;
        ln(Math.cos(a)*r1, Math.sin(a)*r1, Math.cos(a)*r2, Math.sin(a)*r2, CREAM, U * 0.025);
      }
    });
  });
}

// ── Form 2: The Red Square (material, slow pendulum rotation) ──
function drawRedSquare(x, y, sz, rot) {
  save(() => {
    ctx.translate(x, y);
    ctx.rotate(rot);
    // Body
    ctx.fillStyle = RED;
    ctx.fillRect(-sz/2, -sz/2, sz, sz);
    // Hatched inner quadrants (alternating)
    save(() => {
      ctx.globalAlpha = 0.18;
      const h = sz / 2;
      ctx.fillStyle = BLACK;
      ctx.fillRect(-h, -h, h, h);  // top-left
      ctx.fillRect(  0,  0, h, h);  // bottom-right
    });
    // Inner square outline (Albers-style)
    const inn = sz * 0.52;
    ctx.strokeStyle = CREAM; ctx.lineWidth = U * 0.042;
    ctx.strokeRect(-inn/2, -inn/2, inn, inn);
    // Outer border
    ctx.strokeStyle = BLACK; ctx.lineWidth = U * 0.065;
    ctx.strokeRect(-sz/2, -sz/2, sz, sz);
    // Center crosshair
    save(() => {
      ctx.strokeStyle = CREAM; ctx.lineWidth = U * 0.028;
      ln(-sz*0.22, 0, sz*0.22, 0, CREAM, U*0.028);
      ln(0, -sz*0.22, 0, sz*0.22, CREAM, U*0.028);
    });
  });
}

// ── Form 3: The Yellow Triangle (energy, 3 orbiting satellites) ──
function drawYellowTriangles(x, y, r, t) {
  save(() => {
    ctx.translate(x, y);
    // 3 small satellites orbiting
    for (let i = 0; i < 3; i++) {
      const ang = t * 0.65 + (i / 3) * Math.PI * 2;
      const orb = r * 0.62;
      save(() => {
        const sx = Math.cos(ang) * orb, sy = Math.sin(ang) * orb;
        tri(sx, sy, r * 0.26, ang + t * 0.4, YELLOW, BLACK, U * 0.028);
      });
    }
    // Main triangle
    tri(0, 0, r, t * 0.18, YELLOW, BLACK, U * 0.062);
    // Inverted inner triangle
    tri(0, 0, r * 0.38, t * 0.18 + Math.PI, null, YELLOW, U * 0.038);
    // Centerpoint
    disc(0, 0, U * 0.1, BLACK);
  });
}

// ── Kandinsky arc — sweeping color arc connecting the three forms ──
function drawArc(x, y, r, a1, a2, color, w) {
  ctx.beginPath(); ctx.arc(x, y, r, a1, a2);
  ctx.strokeStyle = color; ctx.lineWidth = w; ctx.stroke();
}

// ── Klee rhythm strip — bottom and top of composition ──
function drawRhythm(yPos, t, alpha, flip) {
  save(() => {
    ctx.globalAlpha = alpha;
    const n = 9;
    const gap = W / (n + 1);
    const dir = flip ? -1 : 1;
    for (let i = 0; i < n; i++) {
      const x = gap * (i + 1);
      const ph = t * dir + i * 0.58;
      const sz = U * 0.26 * (0.65 + 0.35 * Math.sin(ph));
      save(() => {
        ctx.translate(x, yPos);
        const col = [RED, YELLOW, BLUE][i % 3];
        if (i % 3 === 0) {
          disc(0, 0, sz, col);
          ring(0, 0, sz, BLACK, U * 0.022);
        } else if (i % 3 === 1) {
          ctx.rotate(ph * 0.45);
          ctx.fillStyle = col; ctx.fillRect(-sz/2, -sz/2, sz, sz);
          ctx.strokeStyle = BLACK; ctx.lineWidth = U * 0.022;
          ctx.strokeRect(-sz/2, -sz/2, sz, sz);
        } else {
          tri(0, 0, sz * 1.2, ph * 0.28, col, BLACK, U * 0.022);
        }
      });
    }
  });
}

// ── Click/tap burst — concentric Bauhaus-color rings ──
function drawBursts(t) {
  clicks = clicks.filter(c => t - c.t < 1.8);
  for (const c of clicks) {
    const age = t - c.t;
    const cols = [RED, YELLOW, BLUE, BLACK];
    save(() => {
      for (let i = 0; i < 4; i++) {
        const r = U * (0.15 + i * 0.45) * age * 2.2;
        ctx.globalAlpha = Math.max(0, 1 - age * 0.58 - i * 0.12);
        ring(c.x, c.y, r, cols[i], U * 0.065);
      }
    });
  }
}

// ─── main loop ─────────────────────────────────────────────────────────────

function draw(now) {
  const t = (now - T0) / 1000;

  ctx.fillStyle = CREAM;
  ctx.fillRect(0, 0, W, H);

  drawGrid(t);
  drawSkeleton(t);

  // ── BLUE CIRCLE — center, slightly right ──
  const bx = cx + U * 0.15 + U * 0.09 * Math.sin(t * 0.28);
  const by = cy - U * 0.25 + U * 0.07 * Math.cos(t * 0.37);
  drawBlueCircle(bx, by, U * 1.6, t);

  // ── RED SQUARE — left panel ──
  const rx = cx - U * 2.7 + U * 0.1 * Math.sin(t * 0.44);
  const ry = cy + U * 0.18 + U * 0.09 * Math.cos(t * 0.31);
  const rRot = t * 0.075 + 0.18 * Math.sin(t * 0.52);
  drawRedSquare(rx, ry, U * 1.8, rRot);

  // ── YELLOW TRIANGLE — right panel ──
  const tx = cx + U * 2.6 + U * 0.12 * Math.cos(t * 0.6);
  const ty = cy + U * 0.1  + U * 0.18 * Math.sin(t * 0.48);
  drawYellowTriangles(tx, ty, U * 1.25, t);

  // ── Kandinsky arcs (dynamic, bridging the three forms) ──
  save(() => {
    ctx.globalAlpha = 0.55;
    drawArc(bx, by, U * 2.35, t * 0.12, t * 0.12 + Math.PI * 1.25, RED, U * 0.055);
    drawArc(bx, by, U * 2.95, -t * 0.09, -t * 0.09 + Math.PI * 0.7, YELLOW, U * 0.04);
  });

  // ── Rhythm strips ──
  drawRhythm(cy + U * 3.55, t, 0.88, false);
  drawRhythm(cy - U * 3.55, t + Math.PI, 0.42, true);

  // ── Tap bursts ──
  drawBursts(t);

  requestAnimationFrame(draw);
}

// ─── interaction ───────────────────────────────────────────────────────────

function onTap(x, y) {
  if (!interacted) { interacted = true; hintEl.classList.add('fade'); }
  clicks.push({ x, y, t: (performance.now() - T0) / 1000 });
}

window.addEventListener('click', e => onTap(e.clientX, e.clientY));
window.addEventListener('touchstart', e => {
  e.preventDefault();
  for (const t of e.changedTouches) onTap(t.clientX, t.clientY);
}, { passive: false });

requestAnimationFrame(draw);
</script>
</body>
</html>
